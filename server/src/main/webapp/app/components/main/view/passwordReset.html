<!-- Localization completed -->
<div class="auth-screen">
    <div class="auth-brand" ng-if="rebranding">
        <img src="rest/public/logo" alt="{{rebranding.appName}}">
        <span class="auth-brand-name">{{rebranding.appName}}</span>
    </div>

    <div class="auth-card">
        <div class="auth-msg-error" ng-if='errorMessage'>{{errorMessage}}</div>
        <div class="auth-msg-success" ng-if='successMessage'>{{successMessage}}</div>
        <div class="auth-card-body" ng-if="linkValid">
            <h3 class="auth-title" localized>form.password.reset.title</h3>
            <form name='passwordResetForm' ng-submit='resetPassword()'>
                <div class="tw-mb-[18px]">
                    <label for='newPassword' class="auth-label" localized>form.profile.password.new</label>
                    <input type='password' class='auth-field' id='newPassword' ng-model='reset.newPassword'
                           localized-placeholder='form.profile.password.new.placeholder' autofocus required/>
                </div>
                <div class="tw-mb-[18px]">
                    <label for='confirmPassword' class="auth-label" localized>form.profile.password.confirm</label>
                    <input type='password' class='auth-field' id='confirmPassword' ng-model='reset.confirmPassword'
                           localized-placeholder='form.profile.password.confirm.placeholder' required/>
                    <div class="field-hint tw-mt-2">{{qualityMessage}}</div>
                </div>
                <button type='submit' class='auth-submit' localized>form.password.reset.submit</button>
            </form>
        </div>
    </div>

    <div class="auth-footer" ng-if="rebranding">
        <span>{{rebranding.appName}}</span> <span localized>app.description</span>. (c) {{rebranding.year}} <a href="{{rebranding.vendorLink}}">{{rebranding.vendorName}}</a>
    </div>
</div>
