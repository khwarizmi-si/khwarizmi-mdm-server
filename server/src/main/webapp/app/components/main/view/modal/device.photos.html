<!-- Localization completed -->
<div class="modal-header">
    <h4 class="modal-title">
        <span localized>device.photos.title</span>
        <span ng-if="device"> &mdash; {{device.number}}</span>
    </h4>
</div>

<div class="modal-body">
    <div ng-show="errorMessage" class="error tw-mb-3"><span>{{errorMessage}}</span></div>

    <div ng-show="loading" class="tw-py-6 tw-text-center tw-text-slate-500" localized>
        device.photos.loading
    </div>

    <div ng-if="!loading && photos.length === 0 && !errorMessage" class="empty-state">
        <div class="empty-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        </div>
        <div class="empty-title" localized>device.photos.empty</div>
    </div>

    <!-- Grid gallery -->
    <div ng-if="!loading && photos.length > 0 && !selected"
         class="tw-grid tw-grid-cols-3 sm:tw-grid-cols-4 tw-gap-3">
        <div ng-repeat="p in photos" class="tw-cursor-pointer tw-group" ng-click="select(p)">
            <img ng-src="{{p.url}}" alt="{{p.name}}"
                 class="tw-w-full tw-h-28 tw-object-cover tw-rounded-xl tw-border tw-border-slate-200 tw-transition group-hover:tw-border-brand-teal group-hover:tw-shadow-md"/>
            <div class="tw-text-[11px] tw-text-slate-400 tw-mt-1 tw-text-center">{{p.ts | date:'short'}}</div>
        </div>
    </div>

    <!-- Enlarged view -->
    <div ng-if="selected" class="tw-text-center">
        <button type="button" class="btn btn-default tw-mb-3" ng-click="back()" localized>device.photos.back</button>
        <div class="tw-text-xs tw-text-slate-500 tw-mb-2">{{selected.ts | date:'medium'}}</div>
        <img ng-src="{{selected.url}}" alt="{{selected.name}}"
             class="tw-max-w-full tw-max-h-[60vh] tw-mx-auto tw-rounded-xl tw-border tw-border-slate-200"/>
    </div>
</div>

<div class="modal-footer">
    <button type="button" class="btn btn-default" ng-click="close()" localized>button.close</button>
</div>
