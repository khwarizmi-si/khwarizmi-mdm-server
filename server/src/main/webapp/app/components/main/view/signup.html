<!-- Localization completed -->
<div class="auth-screen">
    <div class="auth-brand" ng-if="rebranding">
        <img src="rest/public/logo" alt="{{rebranding.appName}}">
        <span class="auth-brand-name">{{rebranding.appName}}</span>
    </div>

    <div class="auth-card">
        <div class="auth-msg-error" ng-if='errorMessage'>{{errorMessage}}</div>
        <div class="auth-msg-success" ng-if='successMessage'>{{successMessage}}</div>
        <div class="auth-card-body">
            <div ng-if="!signupComplete">
                <h3 class="auth-title" localized>signup.title</h3>
                <form name='signupForm' ng-submit='signupForm.$valid && onSignup()'>
                    <div class="tw-mb-[18px]">
                        <label for='email' class="auth-label" localized>signup.email</label>
                        <input class='auth-field' name="email" id='email' ng-pattern="/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/"
                               ng-model='signup.email' localized-placeholder="signup.email.placeholder" autofocus required/>
                        <div class="field-warning tw-mt-2" ng-class="(signupForm.email.$dirty && signupForm.email.$error.pattern) ? '' : 'expired-device-hidden'" localized>signup.email.invalid</div>
                    </div>
                    <label class="tw-flex tw-items-start tw-gap-2 tw-text-[13px] tw-text-slate-600 tw-mb-[18px] tw-font-normal" ng-if="rebranding.termsLink">
                        <input type='checkbox' id='agree' ng-model='signup.agree' required class="tw-mt-[3px]">
                        <span><span localized>signup.terms.agree</span> {{rebranding.appName}}
                            <a href="{{rebranding.termsLink}}" target="_blank" class="tw-text-brand-teal tw-font-semibold hover:tw-text-brand-orange" localized>signup.terms.terms</a></span>
                    </label>
                    <button type='submit' class='auth-submit' ng-if="!loading" localized>signup.submit</button>
                    <button type='submit' class='auth-submit' disabled ng-if="loading" localized>signup.progress</button>
                </form>
            </div>
            <div ng-if="signupComplete">
                <h3 class="auth-title" localized>signup.complete</h3>
                <div class="tw-text-slate-600 tw-text-sm tw-leading-relaxed" localized>signup.email.check</div>
            </div>
        </div>
    </div>

    <div class="auth-footer" ng-if="rebranding">
        <span>{{rebranding.appName}}</span> <span localized>app.description</span>. (c) {{rebranding.year}} <a href="{{rebranding.vendorLink}}">{{rebranding.vendorName}}</a>
    </div>
</div>
