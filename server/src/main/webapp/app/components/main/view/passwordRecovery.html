<!-- Localization completed -->
<div class="auth-screen">
    <div class="auth-brand" ng-if="rebranding">
        <img src="rest/public/logo" alt="{{rebranding.appName}}">
        <span class="auth-brand-name">{{rebranding.appName}}</span>
    </div>

    <div class="auth-card">
        <div class="auth-msg-error" ng-if='errorMessage'>{{errorMessage}}</div>
        <div class="auth-msg-success" ng-if='successMessage'>{{successMessage}}</div>
        <div class="auth-card-body">
            <h3 class="auth-title" localized>recovery.password</h3>
            <form name='passwordRecoveryForm' ng-submit='recoverPassword()'>
                <div class="tw-mb-[18px]">
                    <label for='username' class="auth-label" localized>login.username</label>
                    <input type='text' class='auth-field' id='username' ng-model='username'
                           localized-placeholder='login.username.placeholder' autofocus required/>
                </div>
                <button type='submit' class='auth-submit' ng-disabled="recoverySubmitted" localized>recovery.password</button>
            </form>
        </div>
    </div>

    <div class="auth-footer" ng-if="rebranding">
        <span>{{rebranding.appName}}</span> <span localized>app.description</span>. (c) {{rebranding.year}} <a href="{{rebranding.vendorLink}}">{{rebranding.vendorName}}</a>
    </div>
</div>
