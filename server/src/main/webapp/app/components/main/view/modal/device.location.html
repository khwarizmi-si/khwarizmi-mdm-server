<!-- Localization completed -->
<div class="modal-header">
    <h4 class="modal-title">
        <span localized>device.location.title</span>
        <span ng-if="device"> &mdash; {{device.number}}</span>
    </h4>
</div>

<div class="modal-body">

    <div ng-show="errorMessage" class="error tw-mb-3"><span>{{errorMessage}}</span></div>

    <div ng-show="loading" class="tw-py-6 tw-text-center tw-text-slate-500" localized>
        device.location.loading
    </div>

    <div ng-hide="loading || errorMessage">
        <div ng-if="!location" class="tw-py-6 tw-text-center tw-text-slate-500"
             localized>device.location.empty</div>

        <div ng-if="location">
            <div id="device-location-map" class="device-location-map" aria-label="{{'device.location.map' | localize}}"></div>

            <div class="device-location-meta">
                <div>
                    <span class="device-location-label" localized>device.location.coordinates</span>
                    <span class="tw-font-mono">{{location.lat | number:6}}, {{location.lon | number:6}}</span>
                </div>
                <div ng-if="location.ts">
                    <span class="device-location-label" localized>device.location.reported</span>
                    <span>{{location.ts | date:'medium'}}</span>
                </div>
                <a ng-href="{{openStreetMapUrl}}" target="_blank" rel="noopener noreferrer"
                   localized>device.location.open</a>
            </div>
        </div>
    </div>
</div>

<div class="modal-footer">
    <button type="button" class="btn btn-default" ng-click="close()" localized>button.close</button>
</div>
