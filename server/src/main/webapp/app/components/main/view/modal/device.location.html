<!-- Localization completed -->
<div class="modal-header">
    <h4 class="modal-title">
        <span localized>device.location.title</span>
        <span ng-if="device"> &mdash; {{device.number}}</span>
    </h4>
</div>

<div class="modal-body">

    <div ng-show="errorMessage" class="error tw-mb-3"><span>{{errorMessage}}</span></div>

    <div ng-show="loading" class="tw-py-6 tw-text-center tw-text-slate-500" localized>
        device.location.loading
    </div>

    <div ng-if="!loading && pointCount === 0 && !errorMessage" class="empty-state">
        <div class="empty-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.2-7-11a7 7 0 1 1 14 0c0 4.8-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
        </div>
        <div class="empty-title" localized>device.location.empty</div>
    </div>

    <div ng-if="!loading && pointCount > 0">
        <div class="tw-flex tw-items-center tw-justify-between tw-mb-2 tw-text-sm tw-text-slate-500">
            <span><span localized>device.location.points</span>: <strong class="tw-text-slate-800">{{pointCount}}</strong></span>
            <span ng-if="lastSeen"><span localized>device.location.last</span>: {{lastSeen | date:'medium'}}</span>
        </div>
        <div id="deviceLocationMap" style="height: 460px; width: 100%; border-radius: 12px; overflow: hidden; z-index: 0;"></div>
    </div>
</div>

<div class="modal-footer">
    <button type="button" class="btn btn-default" ng-click="close()" localized>button.close</button>
</div>
